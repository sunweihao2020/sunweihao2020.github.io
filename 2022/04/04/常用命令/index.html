        <h1 id="常用命令"><a href="#常用命令" class="headerlink" title="常用命令"></a>常用命令</h1><figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">span</span> <span class="attr">style</span>=<span class="string">&#x27;color:red;background:white;font-size:20;font-family:楷体;&#x27;</span>&gt;</span>文字<span class="tag">&lt;/<span class="name">span</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="挂载nas"><a href="#挂载nas" class="headerlink" title="挂载nas"></a>挂载nas</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">sudo mount -o username=admin,password=19970130SWh //192.168.3.106/data1 data1/</span><br><span class="line">sudo mount -o username=admin,password=19970130SWh //192.168.3.106/cesm_output cesm_output/</span><br><span class="line">sudo mount -o username=admin,password=19970130SWh //192.168.3.106/qomo-data /home/sun/qomo-data/</span><br><span class="line">sudo mount -o username=admin,password=19970130SWh //192.168.3.106/mydown /home/sun/mydown/</span><br></pre></td></tr></table></figure>



<h2 id="同步"><a href="#同步" class="headerlink" title="同步"></a>同步</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">rsync -v -p -a -t -r -z ./ 2019swh@172.16.0.72:/data5/2019swh/model_data/</span><br><span class="line">rsync -v -p -a -t -r -z 2019swh@172.16.0.72:/data5/2019swh/data/ /home/sun/qomo-data/</span><br><span class="line">rsync -v -p -a -t -r -z /home/sun/qomo-data/ 2019swh@172.16.0.72:/data5/2019swh/data/</span><br><span class="line">rsync -v -p -a -t -r -z /home/sun/mycode/ 2019swh@172.16.0.72:/data5/2019swh/mycode/</span><br><span class="line"><span class="meta prompt_"></span></span><br><span class="line"><span class="meta prompt_"># </span><span class="language-bash">同步山西服务器上的输出</span></span><br><span class="line">rsync -v -p -a -t -r -z wgx@192.168.30.236:/public1/home/wgx/swh/cesm2.1.3/archive/ /mnt/g/cesm_output/</span><br></pre></td></tr></table></figure>



<h2 id="wget下载所有文件"><a href="#wget下载所有文件" class="headerlink" title="wget下载所有文件"></a>wget下载所有文件</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">wget -c -r -np -k -L -p --no-check-certificate</span><br></pre></td></tr></table></figure>

              <h1 id="常用命令"><a href="#常用命令" class="headerlink" title="常用命令"></a>常用命令</h1><figure class="highlight html"><table><tr><td class="gutter"><div class="code-wrapper"><pre><span class="line">1</span><br></pre></div></td><td class="code"><pre><code class="hljs html"><span class="hljs-tag">&lt;<span class="hljs-name">span</span> <span class="hljs-attr">style</span>=<span class="hljs-string">&#x27;color:red;background:white;font-size:20;font-family:楷体;&#x27;</span>&gt;</span>文字<span class="hljs-tag">&lt;/<span class="hljs-name">span</span>&gt;</span><br></code></pre></td></tr></table></figure>

<h2 id="挂载nas"><a href="#挂载nas" class="headerlink" title="挂载nas"></a>挂载nas</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs shell">sudo mount -o username=admin,password=19970130SWh //192.168.3.106/data1 data1/<br>sudo mount -o username=admin,password=19970130SWh //192.168.3.106/cesm_output cesm_output/<br>sudo mount -o username=admin,password=19970130SWh //192.168.3.106/qomo-data /home/sun/qomo-data/<br>sudo mount -o username=admin,password=19970130SWh //192.168.3.106/mydown /home/sun/mydown/<br>sudo mount -o username=admin,password=19970130SWh //192.168.3.106/model_output model_output/<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_"># </span><span class="language-bash">查看某一ip下可挂载目录</span><br>showmount -e 192.168.3.106<br></code></pre></td></tr></table></figure>



<h2 id="同步"><a href="#同步" class="headerlink" title="同步"></a>同步</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs shell">rsync -v -p -a -t -r -z ./ 2019swh@172.16.0.72:/data5/2019swh/model_data/<br>rsync -v -p -a -t -r -z 2019swh@172.16.0.72:/data5/2019swh/data/ /home/sun/qomo-data/<br>rsync -v -p -a -t -r -z /home/sun/qomo-data/ 2019swh@172.16.0.72:/data5/2019swh/data/<br>rsync -v -p -a -t -r -z /home/sun/mycode/ 2019swh@172.16.0.72:/data5/2019swh/mycode/<br><span class="hljs-meta prompt_"></span><br><span class="hljs-meta prompt_"># </span><span class="language-bash">同步山西服务器上的输出</span><br>rsync -v -p -a -t -r -z wgx@192.168.30.236:/public1/home/wgx/swh/cesm2.1.3/archive/ /mnt/g/cesm_output/<br><br>rsync -v -p -a -t -r -z wgx@192.168.30.236:/public1/home/wgx/swh/output/ spinup/<br>rsync -v -p -a -t -r -z lym@192.168.30.236:/public1/home/lym/swh/output/ spinup/<br></code></pre></td></tr></table></figure>



<h2 id="wget下载所有文件"><a href="#wget下载所有文件" class="headerlink" title="wget下载所有文件"></a>wget下载所有文件</h2><figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs css">wget -c -r -np -k -L -<span class="hljs-selector-tag">p</span> <span class="hljs-attr">--no-check-certificate</span><br></code></pre></td></tr></table></figure>



<h2 id="去掉所有文件的可执行权限"><a href="#去掉所有文件的可执行权限" class="headerlink" title="去掉所有文件的可执行权限"></a>去掉所有文件的可执行权限</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs shell">find . -type f -exec chmod -x &#123;&#125; \;<br></code></pre></td></tr></table></figure>



<h2 id="ipynb转python"><a href="#ipynb转python" class="headerlink" title="ipynb转python"></a>ipynb转python</h2><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs shell">jupyter nbconvert --to python my_file.ipynb<br></code></pre></td></tr></table></figure>
